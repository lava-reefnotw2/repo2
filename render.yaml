services:
  - type: web
    name: horarios-unt-app
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20.x
      - key: DATABASE_URL
        fromDatabase:
          name: horarios-unt-db
          property: connectionString
      - key: NEXTAUTH_URL
        value: https://horarios-unt-app.onrender.com # Se actualizará automáticamente si cambias el nombre del servicio
      - key: NEXTAUTH_SECRET
        generateValue: true
      # Variables adicionales que tu app pueda necesitar (ej. correos, etc.)
      # - key: EMAIL_SERVER_USER
      #   value: tu-correo@gmail.com

databases:
  - name: horarios-unt-db
    plan: free
    databaseName: horarios_unt
    user: horarios_user
